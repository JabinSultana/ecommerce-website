<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Order Successful</title>

    <link rel="stylesheet" href="css/style.css" />

    <style>
      /* SUCCESS PAGE */

      .success-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        height: 100vh;

        text-align: center;

        background: #f5f5f5;
      }

      .success-box {
        background: white;

        padding: 40px;

        border-radius: 12px;

        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      .success-box h1 {
        color: green;

        margin-bottom: 15px;
      }

      .success-box p {
        margin-bottom: 20px;

        font-size: 18px;
      }

      .success-box button {
        padding: 12px 20px;

        background: black;

        color: white;

        border: none;

        border-radius: 8px;

        cursor: pointer;

        font-size: 16px;
      }

      .success-box button:hover {
        background: #333;
      }
    </style>
  </head>

  <body>
    <div class="success-container">
      <div class="success-box">
        <h1>✅ Order Successful!</h1>

        <p>
          Thank you for your purchase. Your order has been placed successfully.
        </p>

        <button onclick="goHome()">Continue Shopping</button>
      </div>
    </div>

    <script>
      function goHome() {
        window.location.href = "index.html";
      }
    </script>
  </body>
</html>
