<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Checkout</title>

    <link rel="stylesheet" href="css/style.css" />

    <style>
      /* CHECKOUT PAGE EXTRA STYLES */

      .checkout-container {
        max-width: 700px;
        margin: 40px auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
      }

      .checkout-items {
        margin-top: 20px;
      }

      .checkout-item {
        display: flex;
        align-items: center;
        border-bottom: 1px solid #ddd;
        padding: 10px 0;
      }

      .checkout-item img {
        width: 70px;
        height: 70px;
        object-fit: cover;
        border-radius: 8px;
        margin-right: 15px;
      }

      .checkout-item div {
        flex: 1;
      }

      .checkout-item h4 {
        margin-bottom: 5px;
      }

      .checkout-total {
        margin-top: 20px;
      }

      .place-order-btn {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        background: green;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
      }

      .place-order-btn:hover {
        background: darkgreen;
      }
    </style>
  </head>

  <body>
    <div class="checkout-container">
      <h1>Checkout</h1>

      <div id="checkout-items" class="checkout-items">
        <!-- Items will load here -->
      </div>

      <h2 class="checkout-total">
        Total: ₹ <span id="checkout-total">0</span>
      </h2>

      <button class="place-order-btn" onclick="placeOrder()">
        Place Order
      </button>
    </div>

    <script src="js/checkout.js"></script>
  </body>
</html>
